name: Deploy hiring-agent to sandbox slot

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot alias (dev-slot-1/dev-slot-2/preprod)"
        required: true
        type: choice
        options:
          - sandbox-1
          - sandbox-2
          - sandbox-3
      deploy_ref:
        description: "Git ref to deploy (branch, tag, sha)"
        required: true
        default: "main"
      target_port:
        description: "Optional custom port override on VM"
        required: false
        default: ""

run-name: ${{ inputs.slot == 'sandbox-1' && 'dev-slot-1' || inputs.slot == 'sandbox-2' && 'dev-slot-2' || inputs.slot == 'sandbox-3' && 'preprod' || inputs.slot }} ref=${{ inputs.deploy_ref }} actor=@${{ github.actor }}

permissions:
  contents: read

concurrency:
  group: deploy-hiring-agent-${{ inputs.slot }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.slot == 'sandbox-1' && 'dev-slot-1' || inputs.slot == 'sandbox-2' && 'dev-slot-2' || inputs.slot == 'sandbox-3' && 'preprod' || inputs.slot }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.slot }}
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      SANDBOX_PUBLIC_URL: ${{ secrets.SANDBOX_PUBLIC_URL }}
      HIRING_AGENT_PUBLIC_HOST: ${{ vars.HIRING_AGENT_PUBLIC_HOST || secrets.HIRING_AGENT_PUBLIC_HOST }}
      SANDBOX_DEMO_EMAIL: ${{ secrets.HIRING_AGENT_SANDBOX_DEMO_EMAIL }}
      SANDBOX_DEMO_PASSWORD: ${{ secrets.HIRING_AGENT_SANDBOX_DEMO_PASSWORD }}
      SANDBOX_DEMO_RECRUITER_ID: recruiter-demo-001
      SANDBOX_DEMO_CLIENT_ID: client-demo-001
      MANAGEMENT_DATABASE_URL: ${{ secrets.MANAGEMENT_DATABASE_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      REPO_URL: git@github.com:recruiting-tools/hiring-agent.git

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.deploy_ref }}
      - name: Resolve slot config
        run: |
          set -euo pipefail
          case "${{ inputs.slot }}" in
            sandbox-1)
              echo "TARGET_PORT=${{ inputs.target_port || '3201' }}" >> "$GITHUB_ENV"
              echo "DEPLOY_DIR=/home/vova/hiring-agent-sandbox-001" >> "$GITHUB_ENV"
              echo "PM2_APP_NAME=hiring-agent-sandbox-001" >> "$GITHUB_ENV"
              echo "APP_BASE_PATH=/sandbox-001" >> "$GITHUB_ENV"
              echo "SESSION_COOKIE_NAME=session_sandbox_001" >> "$GITHUB_ENV"
              ;;
            sandbox-2)
              echo "TARGET_PORT=${{ inputs.target_port || '3202' }}" >> "$GITHUB_ENV"
              echo "DEPLOY_DIR=/home/vova/hiring-agent-sandbox-002" >> "$GITHUB_ENV"
              echo "PM2_APP_NAME=hiring-agent-sandbox-002" >> "$GITHUB_ENV"
              echo "APP_BASE_PATH=/sandbox-002" >> "$GITHUB_ENV"
              echo "SESSION_COOKIE_NAME=session_sandbox_002" >> "$GITHUB_ENV"
              ;;
            sandbox-3)
              echo "TARGET_PORT=${{ inputs.target_port || '3203' }}" >> "$GITHUB_ENV"
              echo "DEPLOY_DIR=/home/vova/hiring-agent-sandbox-003" >> "$GITHUB_ENV"
              echo "PM2_APP_NAME=hiring-agent-sandbox-003" >> "$GITHUB_ENV"
              echo "APP_BASE_PATH=/sandbox-003" >> "$GITHUB_ENV"
              echo "SESSION_COOKIE_NAME=session_sandbox_003" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported slot: ${{ inputs.slot }}"
              exit 1
              ;;
          esac
          echo "DEPLOY_REF=${{ inputs.deploy_ref }}" >> "$GITHUB_ENV"
          echo "DEPLOY_TARGET=${{ inputs.slot == 'sandbox-3' && 'preprod' || inputs.slot }}" >> "$GITHUB_ENV"
          echo "DEPLOY_AVG_DURATION_SEC=180" >> "$GITHUB_ENV"
          echo "DEPLOY_WORKFLOW_NAME=Deploy hiring-agent to sandbox slot" >> "$GITHUB_ENV"
          echo "DEPLOY_RUN_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Run slot deploy and smoke
        run: bash ./scripts/ci/hiring-agent-preprod.sh
