name: Sandbox Release Gate

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

concurrency:
  group: sandbox
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  impact-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Impact check
        run: node scripts/impact-check.js

  gate:
    runs-on: ubuntu-latest
    needs: impact-check
    env:
      APP_ENV: sandbox
      HH_USE_MOCK: "true"
      DATABASE_URL: ${{ secrets.SANDBOX_DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable pnpm
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile
      # In CI: run tests only (no smoke — smoke requires a running server)
      - run: pnpm test:sandbox

  moderation-smoke-optional:
    runs-on: ubuntu-latest
    needs: gate
    if: github.event_name == 'pull_request'
    continue-on-error: true
    env:
      APP_ENV: sandbox
      HH_USE_MOCK: "true"
      DATABASE_URL: ${{ secrets.SANDBOX_DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable pnpm
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile
      - name: Run optional moderation smoke (warning-only)
        env:
          PORT: "3137"
          DEMO_PASSWORD: "demo-ci-password"
          RECRUITER_EMAIL: "recruiter@example.test"
          RECRUITER_PASSWORD: "demo-ci-password"
          RECRUITER_TOKEN: "rec-tok-demo-001"
          MODERATION_CONVERSATION_ID: "conv-sales-001"
          MODERATION_JOB_ID: "job-b2b-sales-manager"
          MODERATION_JOB_TITLE: "Менеджер по продажам"
        run: |
          set -euo pipefail
          PORT="$PORT" DEMO_PASSWORD="$DEMO_PASSWORD" node services/candidate-chatbot/src/index.js &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" || true' EXIT
          sleep 2

          export BASE_URL="http://127.0.0.1:${PORT}"
          export MODERATION_BASE_URL="$BASE_URL"

          pnpm smoke:moderation:auth -- --job-id "$MODERATION_JOB_ID" --job-title "$MODERATION_JOB_TITLE"
          pnpm smoke:moderation:queue -- --job-id "$MODERATION_JOB_ID" --job-title "$MODERATION_JOB_TITLE" --conversation-id "$MODERATION_CONVERSATION_ID" --webhook-text "ci-smoke-queue"
          pnpm smoke:moderation:block -- --job-id "$MODERATION_JOB_ID" --job-title "$MODERATION_JOB_TITLE" --conversation-id "$MODERATION_CONVERSATION_ID" --webhook-text "ci-smoke-block"
          pnpm smoke:moderation:drain -- --job-id "$MODERATION_JOB_ID" --conversation-id "$MODERATION_CONVERSATION_ID"

  migration-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check for migration changes
        id: check
        run: |
          echo "changed=false" >> "$GITHUB_OUTPUT"
          if git diff --name-only HEAD~1 HEAD | grep -q 'services/candidate-chatbot/migrations/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Compute ephemeral branch name
        id: branch
        run: echo "name=pr-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
      - name: Install pnpm and dependencies
        if: steps.check.outputs.changed == 'true'
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
      - name: Install neonctl
        if: steps.check.outputs.changed == 'true'
        run: npm install -g neonctl
      - name: Create ephemeral Neon branch
        id: create_branch
        if: steps.check.outputs.changed == 'true'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID || secrets.NEON_PROJECT_ID }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID || secrets.NEON_ORG_ID }}
          NEON_PARENT_BRANCH: ${{ vars.NEON_PARENT_BRANCH || 'sandbox' }}
        run: |
          neonctl branches create \
            --project-id "$NEON_PROJECT_ID" \
            --org-id "$NEON_ORG_ID" \
            --name ${{ steps.branch.outputs.name }} \
            --parent "$NEON_PARENT_BRANCH"
      - name: Get connection string and run migrations
        if: steps.check.outputs.changed == 'true'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID || secrets.NEON_PROJECT_ID }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID || secrets.NEON_ORG_ID }}
        run: |
          EPHEMERAL_DB_URL=$(neonctl connection-string \
            --project-id "$NEON_PROJECT_ID" \
            --org-id "$NEON_ORG_ID" \
            --branch ${{ steps.branch.outputs.name }} \
            --pooled)
          echo "Ephemeral branch ready."
          DATABASE_URL="$EPHEMERAL_DB_URL" node scripts/migrate.js
          DATABASE_URL="$EPHEMERAL_DB_URL" pnpm test:sandbox
      - name: Delete ephemeral Neon branch
        if: always() && steps.create_branch.outcome == 'success'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID || secrets.NEON_PROJECT_ID }}
          NEON_ORG_ID: ${{ vars.NEON_ORG_ID || secrets.NEON_ORG_ID }}
        run: |
          neonctl branches delete \
            --project-id "$NEON_PROJECT_ID" \
            --org-id "$NEON_ORG_ID" \
            ${{ steps.branch.outputs.name }}

  notify-session:
    runs-on: ubuntu-latest
    needs: [gate, migration-check, moderation-smoke-optional]
    if: always() && github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - name: Extract callback URL from PR body
        id: callback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json body -q '.body')
          URL=$(echo "$BODY" | grep -o 'ci-callback: [^ >]*' | head -1 | cut -d' ' -f2)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Notify session
        if: steps.callback.outputs.url != ''
        run: |
          STATUS="${{ needs.gate.result }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "${{ steps.callback.outputs.url }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": \"CI sandbox-gate: $STATUS\\nRun: $RUN_URL\"}"
