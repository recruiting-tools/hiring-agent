name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        env:
          PROJECT_ID: project-5d8dd8a0-67af-44ba-b6e
          DB_SECRET_NAME: V2_PROD_NEON_URL
        run: |
          DB_URL=$(gcloud secrets versions access latest --secret=$DB_SECRET_NAME --project=$PROJECT_ID)
          DATABASE_URL=$DB_URL node scripts/migrate.js

      - name: Deploy to Cloud Run
        env:
          SERVICE: candidate-chatbot-v2
          REGION: europe-west1
          PROJECT_ID: project-5d8dd8a0-67af-44ba-b6e
          DEPLOY_PUBLIC_URL: ${{ secrets.DEPLOY_PUBLIC_URL }}
          DEPLOY_SHA: ${{ github.sha }}
        run: bash ./scripts/deploy.sh

      - name: Post-deploy smoke
        env:
          DEPLOY_PUBLIC_URL: ${{ secrets.DEPLOY_PUBLIC_URL }}
        run: |
          root_status=$(curl -sS -o /tmp/root.body -w "%{http_code}" "$DEPLOY_PUBLIC_URL/")
          login_status=$(curl -sS -o /tmp/login.body -w "%{http_code}" "$DEPLOY_PUBLIC_URL/login")
          health_status=$(curl -sS -o /tmp/health.body -w "%{http_code}" "$DEPLOY_PUBLIC_URL/health")

          [[ "$root_status" =~ ^(2|3)[0-9][0-9]$ ]] || { echo "GET / failed: $root_status"; cat /tmp/root.body; exit 1; }
          [ "$login_status" = "200" ] || { echo "GET /login failed: $login_status"; cat /tmp/login.body; exit 1; }
          grep -qi "<html" /tmp/login.body || { echo "/login did not return HTML"; cat /tmp/login.body; exit 1; }
          [ "$health_status" = "200" ] || { echo "GET /health failed: $health_status"; cat /tmp/health.body; exit 1; }
          grep -q '"status":"ok"' /tmp/health.body || { echo "/health is not ok"; cat /tmp/health.body; exit 1; }
