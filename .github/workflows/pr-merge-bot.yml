name: PR Merge Bot

on:
  pull_request_target:
    branches: [main]
    types: [labeled, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: pr-merge-bot
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge labeled PRs when ready
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const LABEL = "automerge";
            const BASE_REQUIRED_CHECKS = [
              "impact-check",
              "migration-check",
              "gate",
              "up-to-date-with-main",
              "single-owner"
            ];
            const HIRING_AGENT_CHECK = "hiring-agent-gate";
            const HIRING_AGENT_PATH_PREFIXES = [
              "services/hiring-agent/",
              "packages/access-context/",
              "tests/integration/hiring-agent",
              "tests/unit/hiring-agent",
              ".github/workflows/deploy-hiring-agent",
              ".github/workflows/deploy-hiring-agent-sandbox-slot",
              ".github/workflows/hiring-agent-pr-gate.yml",
              "scripts/deploy-hiring-agent.sh",
              "scripts/monitor-hiring-agent.js"
            ];

            function hasLabel(pr, label) {
              return (pr.labels ?? []).some((l) => l.name === label);
            }

            function latestCheckByName(checkRuns) {
              const byName = new Map();
              for (const run of checkRuns) {
                const prev = byName.get(run.name);
                const prevTime = prev ? Date.parse(prev.started_at ?? prev.created_at ?? 0) : 0;
                const thisTime = Date.parse(run.started_at ?? run.created_at ?? 0);
                if (!prev || thisTime >= prevTime) byName.set(run.name, run);
              }
              return byName;
            }

            async function getCandidates() {
              if (context.eventName === "pull_request_target") {
                const pr = context.payload.pull_request;
                if (!pr || !hasLabel(pr, LABEL)) return [];
                return [pr.number];
              }

              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                base: "main",
                per_page: 100
              });

              return prs.filter((pr) => hasLabel(pr, LABEL)).map((pr) => pr.number);
            }

            async function isUpToDate(pr) {
              const baseBranch = await github.rest.repos.getBranch({
                owner,
                repo,
                branch: pr.base.ref
              });
              const baseSha = baseBranch.data.commit.sha;
              const compare = await github.rest.repos.compareCommits({
                owner,
                repo,
                base: baseSha,
                head: pr.head.sha
              });
              return {
                ok: (compare.data.behind_by ?? 0) === 0,
                baseSha,
                behindBy: compare.data.behind_by ?? 0
              };
            }

            function isHiringAgentPath(path) {
              return HIRING_AGENT_PATH_PREFIXES.some((prefix) => path.startsWith(prefix));
            }

            async function requiredChecksForPr(pr) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100
              });

              const requiredChecks = [...BASE_REQUIRED_CHECKS];
              const changedPaths = files.map((file) => file.filename);

              if (changedPaths.some(isHiringAgentPath)) {
                requiredChecks.push(HIRING_AGENT_CHECK);
              }

              return requiredChecks;
            }

            async function checksAreGreen(pr, requiredChecks) {
              const checkRuns = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: pr.head.sha,
                per_page: 100
              });

              const latest = latestCheckByName(checkRuns);
              const failures = [];

              for (const checkName of requiredChecks) {
                const run = latest.get(checkName);
                if (!run) {
                  failures.push(`${checkName}: missing`);
                  continue;
                }
                if (run.status !== "completed" || run.conclusion !== "success") {
                  failures.push(`${checkName}: ${run.status}/${run.conclusion}`);
                }
              }

              return { ok: failures.length === 0, failures };
            }

            const candidates = await getCandidates();
            core.info(`candidates=${candidates.join(", ") || "none"}`);
            if (candidates.length === 0) return;

            for (const prNumber of candidates) {
              const prResp = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber
              });
              const pr = prResp.data;

              if (pr.state !== "open") continue;
              if (pr.draft) {
                core.info(`#${pr.number}: draft, skip`);
                continue;
              }

              const upToDate = await isUpToDate(pr);
              if (!upToDate.ok) {
                core.info(`#${pr.number}: behind main by ${upToDate.behindBy}, skip`);
                continue;
              }

              const requiredChecks = await requiredChecksForPr(pr);
              core.info(`#${pr.number}: required checks -> ${requiredChecks.join(", ")}`);

              const checks = await checksAreGreen(pr, requiredChecks);
              if (!checks.ok) {
                core.info(`#${pr.number}: checks not green -> ${checks.failures.join("; ")}`);
                continue;
              }

              if (["dirty", "behind", "blocked"].includes(pr.mergeable_state)) {
                core.info(`#${pr.number}: mergeable_state=${pr.mergeable_state}, skip`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: "merge",
                  sha: pr.head.sha
                });
                core.info(`#${pr.number}: merged`);
              } catch (error) {
                core.warning(`#${pr.number}: merge failed -> ${error.message}`);
              }
            }
